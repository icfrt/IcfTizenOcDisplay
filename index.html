<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OwnCloud Slideshow</title>
    <link rel="stylesheet" type="text/css" href="css/style.css"/>
    <script src="./config.js"></script>
    <script src="./main.js"></script>
</head>
<body>
    <div id="app">
        <div id="status">Initializing…</div>

        <div id="provision">
            <p>This display is not configured.</p>
            <p>Visit: <span id="provision-url"></span></p>
            <p class="provision-code" id="provision-code"></p>
        </div>

        <div id="slideshow" aria-live="polite">
            <img id="slideA" class="slide" src="" alt="Slideshow" />
            <img id="slideB" class="slide" src="" alt="Slideshow" />
            <div id="slide-overlay"></div>
        </div>
    </div>
</body>
</html>
